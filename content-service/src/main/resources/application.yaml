spring:
  application:
    name: content-service
  datasource:
    url: jdbc:mysql://localhost:3306/popular_content
    username: app
    password: app1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: localhost:9092
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
