spring:
  application:
    name: query-service
  data:
    mongodb:
      host: localhost
      port: 27017
      database: popular_query
      username: root
      password: root
      authentication-database: admin
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8083

content-service:
  base-url: http://localhost:8080
